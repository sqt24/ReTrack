project: stable_diffusion_unlearning

logging_dir: logs
checkpoint_dir: ${storage_root}/checkpoints/stable_diffusion/pretrained/stable_diffusion_v1_4
data_dir: ${storage_root}/datasets/sd
artifacts:
  model_root: ${storage_root}/checkpoints/stable_diffusion/unlearn
  results_root: ${storage_root}/results/stable_diffusion
original_prompts_path: ${data_dir}/original_prompts.json
modified_prompts_path: ${data_dir}/modified_prompts.json

algorithm:
  retrack:
    K: 10
    lambda: 0.5
  siss:
    rescale_factor: 750

train:
  batch_size: 1
  gradient_accumulation_steps: 16
  steps: 30
  lr:
    scheduler: constant
    warmup_steps: 0
  dataloader_num_workers: 0
  mixed_precision: null

eval:
  steps: 5
  batch_size: 16
  num_images: 16
  num_visualize: 16
  num_inference_steps: 50
  save_images: false

model:
  _target_: diffusers.UNet2DConditionModel.from_pretrained
  pretrained_model_name_or_path: ${checkpoint_dir}
  subfolder: unet

scheduler:
  _target_: diffusers.DDPMScheduler.from_pretrained
  pretrained_model_name_or_path: ${checkpoint_dir}
  subfolder: scheduler

tokenizer:
  _target_: transformers.CLIPTokenizer.from_pretrained
  pretrained_model_name_or_path: ${checkpoint_dir}
  subfolder: tokenizer

text_encoder:
  _target_: transformers.CLIPTextModel.from_pretrained
  pretrained_model_name_or_path: ${checkpoint_dir}
  subfolder: text_encoder

vae:
  _target_: diffusers.AutoencoderKL.from_pretrained
  pretrained_model_name_or_path: ${checkpoint_dir}
  subfolder: vae

optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-5
  betas: [0.9, 0.999]
  weight_decay: 1e-2
  eps: 1e-8

evaluator:
  _target_: retrack.evaluators.SDEvaluator

dataset:
  class: retrack.datasets.SDDataset
  remain:
    _target_: ${dataset.class}
    data_dir: ${data_dir}
    filter: remain
  deletion:
    _target_: ${dataset.class}
    data_dir: ${data_dir}
    filter: deletion
  knn:
    _target_: ${dataset.class}
    data_dir: ${data_dir}
    filter: knn
    K: ${algorithm.retrack.K}
